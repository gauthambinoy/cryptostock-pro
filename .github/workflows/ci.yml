name: QuantumLedger CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx
      
      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-for-ci-only
          DATABASE_URL: sqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: testing
          DEBUG: "true"
        run: |
          cd backend
          python -m pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: cd frontend && npm ci
      
      - name: Run linter
        run: cd frontend && npm run lint --if-present
      
      - name: Run tests
        run: cd frontend && npm test -- --reporter=verbose
      
      - name: Build
        run: cd frontend && npm run build

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  docker-build:
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t quantumledger:latest .
      
      - name: Test Docker health
        run: |
          docker run -d --name ql-test \
            -e SECRET_KEY=test-docker-key \
            -e DATABASE_URL=sqlite:///./data/test.db \
            -e DEBUG=true \
            -p 8000:8000 \
            quantumledger:latest
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health; then
              docker stop ql-test
              exit 0
            fi
            sleep 2
          done
          docker logs ql-test
          docker stop ql-test
          exit 1
